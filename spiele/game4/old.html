<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Neon Blitz</title>

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0015;color:#ff00cc;font-family:'Bebas Neue',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
